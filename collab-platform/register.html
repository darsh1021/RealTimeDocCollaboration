<!DOCTYPE html>

<html class="light" lang="en"><head>

        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<!-- Top Navigation Placeholder (Simplified for Auth) -->
<nav class="w-full px-6 py-6 lg:px-12 flex justify-between items-center absolute top-0 left-0">
<div class="flex items-center gap-2">
<div class="text-primary">
<svg class="w-8 h-8" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M39.475 21.6262C40.358 21.4363 40.6863 21.5589 40.7581 21.5934C40.7876 21.655 40.8547 21.857 40.8082 22.3336C40.7408 23.0255 40.4502 24.0046 39.8572 25.2301C38.6799 27.6631 36.5085 30.6631 33.5858 33.5858C30.6631 36.5085 27.6632 38.6799 25.2301 39.8572C24.0046 40.4502 23.0255 40.7407 22.3336 40.8082C21.8571 40.8547 21.6551 40.7875 21.5934 40.7581C21.5589 40.6863 21.4363 40.358 21.6262 39.475C21.8562 38.4054 22.4689 36.9657 23.5038 35.2817C24.7575 33.2417 26.5497 30.9744 28.7621 28.762C30.9744 26.5497 33.2417 24.7574 35.2817 23.5037C36.9657 22.4689 38.4054 21.8562 39.475 21.6262ZM4.41189 29.2403L18.7597 43.5881C19.8813 44.7097 21.4027 44.9179 22.7217 44.7893C24.0585 44.659 25.5148 44.1631 26.9723 43.4579C29.9052 42.0387 33.2618 39.5667 36.4142 36.4142C39.5667 33.2618 42.0387 29.9052 43.4579 26.9723C44.1631 25.5148 44.659 24.0585 44.7893 22.7217C44.9179 21.4027 44.7097 19.8813 43.5881 18.7597L29.2403 4.41187C27.8527 3.02428 25.8765 3.02573 24.2861 3.36776C22.6081 3.72863 20.7334 4.58419 18.8396 5.74801C16.4978 7.18716 13.9881 9.18353 11.5858 11.5858C9.18354 13.988 7.18717 16.4978 5.74802 18.8396C4.58421 20.7334 3.72865 22.6081 3.36778 24.2861C3.02574 25.8765 3.02429 27.8527 4.41189 29.2403Z" fill="currentColor" fill-rule="evenodd"></path>

</div>
<span class="text-xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">CollabDocs</span>
</div>
<div class="hidden sm:block">
<span class="text-slate-500 dark:text-slate-400 text-sm mr-2">Already have an account?</span>
<a class="text-primary font-semibold text-sm hover:underline" href="#">Log in</a>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-4 py-24 sm:py-32">
<div class="w-full max-w-[480px]">
<!-- Registration Card -->
<div class="bg-white dark:bg-slate-900 shadow-xl shadow-slate-200/50 dark:shadow-none rounded-xl p-8 sm:p-10 border border-slate-100 dark:border-slate-800">
<!-- Card Header -->
<div class="text-center mb-8">
<h1 class="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-slate-100 mb-2">Create an account</h1>
<p class="text-slate-500 dark:text-slate-400">Join 10,000+ collaborators worldwide. Start for free.</p>
</div>
<!-- Registration Form -->
<form class="space-y-5">
<!-- Full Name -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="full_name">Full Name</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" id="full_name" name="full_name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Address -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="password">Password</label>
<div class="relative flex items-center">
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all pr-12" id="password" name="password" placeholder="At least 8 characters" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
<p class="mt-1.5 text-xs text-slate-400">Must include a letter, a number and a symbol.</p>
</div>
<!-- Confirm Password -->
<div>
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5" for="confirm_password">Confirm Password</label>
<div class="relative flex items-center">
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all pr-12" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 py-2">
<div class="flex items-center h-5">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary/20" id="terms" name="terms" type="checkbox"/>
</div>
<label class="text-sm text-slate-500 dark:text-slate-400 leading-snug" for="terms">
                            By creating an account, you agree to our <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2" type="submit">
<span>Sign Up</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-3 bg-white dark:bg-slate-900 text-slate-500 uppercase tracking-widest text-[10px] font-bold">Or continue with</span>
</div>
</div>
<!-- Social Sign Up -->
<div class="grid grid-cols-1 gap-4">
<button class="flex items-center justify-center gap-3 px-4 py-3 border border-slate-200 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors text-slate-700 dark:text-slate-200 font-medium">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Google</span>
</button>
</div>
<!-- Responsive Footer (Mobile only) -->
<div class="mt-8 text-center sm:hidden">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Already have an account? 
                        <a class="text-primary font-semibold hover:underline" href="#">Log in</a>
</p>
</div>
</div>
<!-- Additional Footer Links -->
<footer class="mt-8 text-center space-x-6">
<a class="text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">Support</a>
<a class="text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">Privacy</a>
<a class="text-xs text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" href="#">Terms</a>
</footer>
</div>
</main>
<!-- Side Decoration (Hidden on smaller screens) -->
<div class="fixed right-0 top-0 h-full w-1/4 hidden lg:block overflow-hidden pointer-events-none opacity-50 dark:opacity-20">
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-transparent"></div>
<div class="absolute -right-20 top-1/4 w-96 h-96 rounded-full bg-primary/5 blur-3xl"></div>
<div class="absolute right-10 bottom-1/4 w-64 h-64 rounded-full bg-primary/10 blur-2xl"></div>
</div>
</body></html>
