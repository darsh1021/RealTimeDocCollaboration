<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | CollabDoc</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1337ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .bg-subtle-gradient {
            background: linear-gradient(135deg, #f8faff 0%, #ffffff 100%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen flex-col items-center justify-center bg-subtle-gradient px-4 py-12 sm:px-6 lg:px-8">
<!-- Navigation Header (Floating Minimal) -->
<nav class="absolute top-0 left-0 right-0 px-8 py-6 flex items-center justify-between max-w-7xl mx-auto w-full">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-3xl font-bold">layers</span>
<span class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">CollabDoc</span>
</div>
<div class="hidden md:flex items-center gap-8">
<a class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors" href="#">Features</a>
<a class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors" href="#">Pricing</a>
<a class="text-slate-600 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors" href="#">Support</a>
</div>
</nav>
<!-- Login Card Container -->
<div class="w-full max-w-[440px]">
<div class="bg-white dark:bg-slate-900 shadow-xl shadow-primary/5 rounded-2xl border border-slate-200/60 dark:border-slate-800 p-8 sm:p-10">
<!-- Card Header -->
<div class="text-center mb-10">
<h1 class="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-slate-100 tracking-tight mb-2">Welcome back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Sign in to continue your collaborative work</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember-me">Remember me for 30 days</label>
</div>
<!-- Primary Submit Button -->
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-3 text-slate-500 font-medium">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-11 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<img alt="" class="w-4 h-4" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcY1TNOzSbMchDReOrbZ5--d3MfN9meiUD8XSYN9M52mpnfuGwVURgR6IacR8mYmabbV90H_hwaNLGPKlJTZfHwU721MxOLXdJx409oKnD1ZL1dU7VMH1xZ5rdM4Q2neXvizSbGb9uj8PD9zMKnJLdXKQvT-zPmjfqnvuvt7VC2DP0jS_lLV5bgvQf0YCWQdpsZ1efyib9ru6jCYyhkxrGdbIGYwbars0ftE9R0vyNiWYf5bQ-I4zd3XH3ybH1uih4j_Uil4EO-CY"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 h-11 border border-slate-300 dark:border-slate-700 rounded-lg bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24">
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path>
</svg>
                        GitHub
                    </button>
</div>
</div>
<!-- Footer Links -->
<p class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
                Don't have an account? 
                <a class="font-semibold text-primary hover:underline ml-1" href="#">Create an account</a>
</p>
</div>
<!-- Decorative Elements -->
<div class="absolute bottom-10 left-10 hidden xl:block opacity-20 dark:opacity-10 pointer-events-none">
<div class="flex flex-col gap-4">
<div class="h-2 w-48 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
<div class="h-2 w-32 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
<div class="h-2 w-40 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
</div>
<div class="absolute top-1/4 right-10 hidden xl:block opacity-20 dark:opacity-10 pointer-events-none">
<div class="grid grid-cols-3 gap-2">
<div class="w-3 h-3 rounded-full bg-primary"></div>
<div class="w-3 h-3 rounded-full bg-primary/40"></div>
<div class="w-3 h-3 rounded-full bg-primary/20"></div>
<div class="w-3 h-3 rounded-full bg-primary/20"></div>
<div class="w-3 h-3 rounded-full bg-primary"></div>
<div class="w-3 h-3 rounded-full bg-primary/40"></div>
</div>
</div>
</div>
</body></html>
